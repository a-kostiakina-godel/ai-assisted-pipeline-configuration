name: Playwright Tests

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

# Cancel in-progress runs for the same PR
concurrency:
  group: playwright-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

# Minimal read-only permissions
permissions:
  contents: read

jobs:
  playwright-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CI: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: npx playwright test

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-html-report
          path: playwright-report/
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results/**/trace*.zip
          retention-days: 30
          if-no-files-found: ignore

  security-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: false
    env:
      CI: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Run npm audit
        id: audit
        run: |
          npm audit --audit-level=high --json > audit-report.json 2>&1 || true

      - name: Write summary report
        if: always()
        run: |
          echo "## Security Scan — npm audit" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          CRITICAL=$(cat audit-report.json | node -e "const d=require('fs').readFileSync('/dev/stdin','utf8');const r=JSON.parse(d);const v=r.metadata?.vulnerabilities||{};console.log(v.critical||0)")
          HIGH=$(cat audit-report.json | node -e "const d=require('fs').readFileSync('/dev/stdin','utf8');const r=JSON.parse(d);const v=r.metadata?.vulnerabilities||{};console.log(v.high||0)")
          MODERATE=$(cat audit-report.json | node -e "const d=require('fs').readFileSync('/dev/stdin','utf8');const r=JSON.parse(d);const v=r.metadata?.vulnerabilities||{};console.log(v.moderate||0)")
          LOW=$(cat audit-report.json | node -e "const d=require('fs').readFileSync('/dev/stdin','utf8');const r=JSON.parse(d);const v=r.metadata?.vulnerabilities||{};console.log(v.low||0)")
          echo "| Severity | Count |" >> $GITHUB_STEP_SUMMARY
          echo "| -------- | ----- |" >> $GITHUB_STEP_SUMMARY
          echo "| Critical | $CRITICAL |" >> $GITHUB_STEP_SUMMARY
          echo "| High     | $HIGH |" >> $GITHUB_STEP_SUMMARY
          echo "| Moderate | $MODERATE |" >> $GITHUB_STEP_SUMMARY
          echo "| Low      | $LOW |" >> $GITHUB_STEP_SUMMARY

      - name: Fail on high or critical vulnerabilities
        run: npm audit --audit-level=high

  deploy-pages:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [playwright-tests, security-scan]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
    env:
      CI: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Playwright report
        uses: actions/download-artifact@v4
        with:
          name: playwright-html-report
          path: playwright-report/

      - name: Verify report exists
        run: |
          if [ ! -f playwright-report/index.html ]; then
            echo "::error::No Playwright HTML report found"
            exit 1
          fi

      - name: Disable Jekyll
        run: touch playwright-report/.nojekyll

      - name: Fetch previous history
        env:
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          SHA: ${{ github.sha }}
          REF: ${{ github.ref }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          TEST_RESULT: ${{ needs.playwright-tests.result }}
        run: |
          PAGES_URL="https://${REPO_OWNER}.github.io/${REPO_NAME}/history.json"
          PRIOR_HISTORY=$(curl -fsSL "$PAGES_URL" 2>/dev/null || echo "[]")

          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          NEW_ENTRY=$(jq -n \
            --arg ts         "$TIMESTAMP" \
            --arg run_url    "$RUN_URL" \
            --arg sha        "$SHA" \
            --arg ref        "$REF" \
            --arg job_status "$TEST_RESULT" \
            '{timestamp: $ts, run_url: $run_url, sha: $sha, ref: $ref, job_status: $job_status}')

          echo "$PRIOR_HISTORY" | jq --argjson entry "$NEW_ENTRY" '. + [$entry] | .[-100:]' \
            > playwright-report/history.json

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: playwright-report/

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4

  notify-on-failure:
    runs-on: ubuntu-latest
    needs: [playwright-tests, deploy-pages, security-scan]
    if: failure()
    env:
      TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
      PR_TITLE: ${{ github.event.pull_request.title }}
      PR_AUTHOR: ${{ github.event.pull_request.user.login }}
      BRANCH: ${{ github.head_ref }}
      RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

    steps:
      - name: Notify Teams on failure
        run: |
          cat > payload.json <<EOF
          {
            "type": "message",
            "attachments": [{
              "contentType": "application/vnd.microsoft.card.adaptive",
              "content": {
                "\$schema": "http://adaptivecards.io/schemas/adaptive-card.json",
                "type": "AdaptiveCard",
                "version": "1.4",
                "body": [
                  {
                    "type": "TextBlock",
                    "size": "Large",
                    "weight": "Bolder",
                    "color": "Attention",
                    "text": "Playwright Tests Failed"
                  },
                  {
                    "type": "FactSet",
                    "facts": [
                      { "title": "PR Title:", "value": "${PR_TITLE}" },
                      { "title": "Author:",   "value": "${PR_AUTHOR}" },
                      { "title": "Branch:",   "value": "${BRANCH}" }
                    ]
                  }
                ],
                "actions": [
                  { "type": "Action.OpenUrl", "title": "View Failed Run", "url": "${RUN_URL}" }
                ]
              }
            }]
          }
          EOF
          curl -s -H "Content-Type: application/json" -d @payload.json "$TEAMS_WEBHOOK_URL"
